    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareSourceCode",
        "name": "scalajs-jfx",
        "description": "Reactive UI framework for Scala.js with lifecycle control, typed forms, routing and a composable JavaFX-inspired DSL.",
        "programmingLanguage": "Scala",
        "runtimePlatform": "Scala.js",
        "license": "https://opensource.org/licenses/MIT",

        }

    <script>
      (() => {
        try {
          const key = 'scalajs-jfx.theme'
          const stored = localStorage.getItem(key)
          const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          const theme = stored === 'dark' || stored === 'light' ? stored : preferred
          document.documentElement.dataset.theme = theme
          const meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.content = theme === 'dark' ? '#171918' : '#eee9e1'
        } catch (error) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>

    <div id="root"></div>
